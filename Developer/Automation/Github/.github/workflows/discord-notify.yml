name: Discord Notify

on:
  push:
    branches:
      - main
  issue_comment:
    types: [created]

jobs:
  discord:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Error: DISCORD_WEBHOOK_URL secret not found."
            exit 1
          fi

          # 1. Determine the event type and build the message
          if [ "${{ github.event_name }}" == "push" ]; then
            TITLE="Code Push"
            MSG="${{ github.event.head_commit.message }}"
            URL="${{ github.event.head_commit.url }}"
          elif [ "${{ github.event_name }}" == "issue_comment" ]; then
            # NEW: Grab the Issue Title
            ISSUE_NAME="${{ github.event.issue.title }}"
            TITLE="Comment on: $ISSUE_NAME (#${{ github.event.issue.number }})"
            MSG="${{ github.event.comment.body }}"
            URL="${{ github.event.comment.html_url }}"
          else
            TITLE="GitHub Notification"
            MSG="Action triggered by ${{ github.event_name }}"
            URL="${{ github.event.repository.html_url }}"
          fi

          # 2. Build the JSON payload safely
          payload=$(jq -n \
            --arg un "Scrap Runners Bot" \
            --arg title "$TITLE" \
            --arg repo "${{ github.repository }}" \
            --arg user "${{ github.actor }}" \
            --arg msg "$MSG" \
            --arg url "$URL" \
            '{
              username: $un,
              content: ("**\($title)**\n**Repo:** \($repo)\n**User:** \($user)\n**Content:** \($msg)\n**Link:** \($url)")
            }')

          # 3. Send the POST request
          curl -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK"